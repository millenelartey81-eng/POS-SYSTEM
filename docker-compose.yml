version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: pos_mysql
    environment:
      MYSQL_ROOT_PASSWORD: root_password_123
      MYSQL_DATABASE: pos_system
      MYSQL_USER: pos_user
      MYSQL_PASSWORD: pos_password_123
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./database/seeds.sql:/docker-entrypoint-initdb.d/02-seeds.sql
    networks:
      - pos_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  php:
    image: php:8.1-fpm
    container_name: pos_php
    working_dir: /app
    environment:
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_NAME=pos_system
      - DB_USER=pos_user
      - DB_PASSWORD=pos_password_123
    volumes:
      - ./backend:/app
      - ./backend/php.ini:/usr/local/etc/php/conf.d/custom.ini
    networks:
      - pos_network
    depends_on:
      mysql:
        condition: service_healthy
    command: >
      sh -c "apt-get update && apt-get install -y libpq-dev &&
      docker-php-ext-install pdo pdo_mysql &&
      php-fpm"

  nginx:
    image: nginx:alpine
    container_name: pos_nginx
    ports:
      - "8000:80"
    volumes:
      - ./backend:/app
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - pos_network
    depends_on:
      - php

  frontend:
    image: node:18-alpine
    container_name: pos_frontend
    working_dir: /app
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=http://localhost:8000/api
    command: sh -c "npm install && npm run dev"
    networks:
      - pos_network

volumes:
  mysql_data:
    driver: local

networks:
  pos_network:
    driver: bridge
